language = "C"
include_guard = "TAIYAKI_H"
autogen_warning = "/* Warning: this file is autogenerated by cbindgen. Do not modify manually. */"
no_includes = false
sys_includes = ["stdint.h", "stddef.h"]

[export]
include = ["TaiyakiStatus", "TaiyakiType", "MemoryStats"]
exclude = [
    "Option_JSObjectCallAsFunctionCallback",
    "Option_JSObjectFinalizeCallback",
    "Option_JSShouldTerminateCallback",
    "JSClassDefinition",
    "JSObjectCallAsFunctionCallback",
    "JSGlobalContextRef",
    "JSClassRef",
    "JSObjectRef",
    "JSContextRef",
    "JSContextGroupRef",
    "JSType",
    "JSValueRef",
    "JSStringRef",
    "JSPropertyAttributes",
    "JSClassAttributes",
    "JscEngine",
]

[parse]
parse_deps = false

[parse.expand]
# Only expand macros in ffi.rs — this prevents cbindgen from seeing JSC internals
crates = []

[export.rename]
"TaiyakiStatus" = "taiyaki_status"
"TaiyakiType" = "taiyaki_type"
"TaiyakiRuntime" = "taiyaki_runtime"
"TaiyakiValue" = "taiyaki_value"
"MemoryStats" = "taiyaki_memory_stats"

[enum]
rename_variants = "QualifiedScreamingSnakeCase"
