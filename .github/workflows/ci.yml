name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ─── Formatting + Linting ──────────────────────────────────
  rust-check:
    name: Rust lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

  # ─── Rust tests (QuickJS backend) ─────────────────────────
  rust-test:
    name: Rust tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Build
        run: cargo build

      - name: Run tests
        run: cargo test

      - name: Build with SQLite
        run: cargo build -p taiyaki-cli --features sqlite

      - name: Test with SQLite
        run: cargo test -p taiyaki-cli --features sqlite

  # ─── JSC backend tests ─────────────────────────────────────
  jsc-test:
    name: JSC backend tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install libjavascriptcoregtk (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libjavascriptcoregtk-6.0-dev || \
          sudo apt-get install -y libjavascriptcoregtk-4.1-dev || \
          sudo apt-get install -y libjavascriptcoregtk-4.0-dev

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-jsc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-jsc-

      - name: Build (JSC)
        run: cargo build -p taiyaki-core --features jsc --no-default-features

      - name: Test (JSC)
        run: cargo test -p taiyaki-core --features jsc --no-default-features

  # ─── Python bindings + Web framework tests ────────────────
  python-test:
    name: Python tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-python-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-python-

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('packages/taiyaki-web/pyproject.toml', 'crates/taiyaki-python/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install maturin
        run: uv pip install maturin --system

      - name: Build taiyaki-python wheel
        run: cd crates/taiyaki-python && maturin build --out target/wheels

      - name: Set up taiyaki-web venv and install
        run: |
          cd packages/taiyaki-web
          uv venv --python 3.13
          uv pip install ../../crates/taiyaki-python/target/wheels/*.whl
          uv pip install -e ".[test]"

      - name: Run taiyaki-web tests
        run: cd packages/taiyaki-web && uv run python -m pytest tests/ -v
