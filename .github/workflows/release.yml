name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ─── Build CLI binaries ───────────────────────────────────
  build-cli:
    name: CLI ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # QuickJS (default) — all platforms
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            label: linux-x86_64
            features: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            label: linux-aarch64
            features: ""
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            label: macos-x86_64
            features: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            label: macos-aarch64
            features: ""
          # JSC backend
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            label: linux-x86_64-jsc
            features: "--no-default-features --features jsc"
            jsc-linux: true
          - target: x86_64-apple-darwin
            os: macos-latest
            label: macos-x86_64-jsc
            features: "--no-default-features --features jsc"
          - target: aarch64-apple-darwin
            os: macos-latest
            label: macos-aarch64-jsc
            features: "--no-default-features --features jsc"
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install libjavascriptcoregtk (Linux JSC)
        if: matrix.jsc-linux
        run: |
          sudo apt-get update
          sudo apt-get install -y libjavascriptcoregtk-6.0-dev || \
          sudo apt-get install -y libjavascriptcoregtk-4.1-dev || \
          sudo apt-get install -y libjavascriptcoregtk-4.0-dev

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p taiyaki-cli ${{ matrix.features }}
          else
            cargo build --release --target ${{ matrix.target }} -p taiyaki-cli ${{ matrix.features }}
          fi

      - name: Package
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE="taiyaki-${TAG}-${{ matrix.label }}.tar.gz"
          cd target/${{ matrix.target }}/release
          tar czf "../../../${ARCHIVE}" taiyaki
          cd ../../..
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.label }}
          path: ${{ env.ARCHIVE }}

  # ─── Publish to crates.io ─────────────────────────────────
  publish-crates:
    name: Publish crates.io
    runs-on: ubuntu-latest
    needs: [build-cli]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish taiyaki-core
        run: cargo publish -p taiyaki-core --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Publish taiyaki-node-polyfill
        run: |
          sleep 30
          cargo publish -p taiyaki-node-polyfill --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Publish taiyaki-cli
        run: |
          sleep 30
          cargo publish -p taiyaki-cli --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

  # ─── Build taiyaki (QuickJS) wheels ────────────────────────
  build-taiyaki-wheels:
    name: PyPI taiyaki (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            label: linux-x86_64
          - os: macos-latest
            target: x86_64
            label: macos-x86_64
          - os: macos-latest
            target: aarch64
            label: macos-aarch64
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m crates/taiyaki-python/Cargo.toml -i python3.13
          manylinux: manylinux_2_28
          before-script-linux: dnf install -y clang-devel

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-quickjs-${{ matrix.label }}
          path: dist

  publish-taiyaki-pypi:
    name: PyPI upload (taiyaki)
    runs-on: ubuntu-latest
    needs: [build-taiyaki-wheels]
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-quickjs-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          attestations: false
          skip-existing: true

  # ─── Build taiyaki-jsc wheels ─────────────────────────────
  build-taiyaki-jsc-wheels:
    name: PyPI taiyaki-jsc (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            label: linux-x86_64
          - os: macos-latest
            target: x86_64
            label: macos-x86_64
          - os: macos-latest
            target: aarch64
            label: macos-aarch64
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install libjavascriptcoregtk (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libjavascriptcoregtk-6.0-dev || \
          sudo apt-get install -y libjavascriptcoregtk-4.1-dev || \
          sudo apt-get install -y libjavascriptcoregtk-4.0-dev

      - name: Use JSC pyproject.toml
        run: cp crates/taiyaki-python/pyproject-jsc.toml crates/taiyaki-python/pyproject.toml

      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m crates/taiyaki-python/Cargo.toml --no-default-features --features jsc -i python3.13
          manylinux: manylinux_2_28
          before-script-linux: dnf install -y clang-devel webkit2gtk4.0-devel || dnf install -y clang-devel webkit2gtk3-devel

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-taiyaki-jsc-${{ matrix.label }}
          path: dist

  publish-taiyaki-jsc-pypi:
    name: PyPI upload (taiyaki-jsc)
    runs-on: ubuntu-latest
    needs: [build-taiyaki-jsc-wheels]
    environment: pypi-taiyaki-jsc
    permissions:
      id-token: write
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-taiyaki-jsc-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          attestations: false
          skip-existing: true

  # ─── Publish taiyaki-web to PyPI ──────────────────────────
  publish-taiyaki-web-pypi:
    name: PyPI upload (taiyaki-web)
    runs-on: ubuntu-latest
    environment: pypi-taiyaki-web
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build packages/taiyaki-web

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/taiyaki-web/dist/
          attestations: false
          skip-existing: true

  # ─── GitHub Release ───────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-cli, publish-crates]
    steps:
      - uses: actions/checkout@v6

      - name: Download CLI artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: cli-*
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
