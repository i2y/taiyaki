[project]
name = "taiyaki-aot-compiler"
version = "0.1.0"
description = "JavaScript/TypeScript AOT compiler via LLVM"
requires-python = ">=3.12"
dependencies = ["llvmlite>=0.44", "rich>=13.0", "tree-sitter>=0.24", "tree-sitter-javascript>=0.23", "tree-sitter-typescript>=0.23"]

[project.scripts]
taiyaki-aot = "taiyaki_aot_compiler.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/taiyaki_aot_compiler"]

[tool.ux]
entry = "taiyaki-aot"
include = [
    "vendor/quickjs-ng/quickjs.h",
    "vendor/quickjs-ng/quickjs-libc.h",
    "vendor/quickjs-ng/build/",
    "vendor/clay/",
    "vendor/termbox2/",
    "vendor/tsuchi_game_framework.c",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
]
