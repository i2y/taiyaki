[project]
name = "taiyaki-web"
version = "0.1.0"
description = "Python web framework with Preact SSR + htmx + Islands"
requires-python = ">=3.13"
license = "MIT"
authors = [{ name = "Yasushi Itoh" }]
keywords = ["web", "framework", "preact", "ssr", "htmx"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Framework :: AsyncIO",
]
dependencies = [
    "starlette>=1.0",
    "uvicorn[standard]>=0.43",
    "python-multipart>=0.0.24",
    "httpx>=0.28",
    "rich>=13.0",
]

[project.optional-dependencies]
quickjs = ["taiyaki>=0.1.0"]
jsc = ["taiyaki-jsc>=0.1.0"]
dev = ["watchfiles>=1.1", "ruff>=0.8"]
test = ["pytest>=9.0", "httpx>=0.28", "pytest-asyncio>=1.3"]
mcp = ["mcp>=1.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.setuptools.packages.find]
include = ["taiyaki_web*"]

[project.urls]
Repository = "https://github.com/i2y/taiyaki"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
